<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0b0f2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Simple blue glows */
        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: #00d4ff;
            filter: blur(100px);
            top: 15%;
            left: 10%;
            opacity: 0.15;
        }

        body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: #0099cc;
            filter: blur(80px);
            bottom: 15%;
            right: 10%;
            opacity: 0.12;
        }

        /* Simple card */
        .box {
            width: 100%;
            max-width: 380px;
            padding: 45px 35px;
            border-radius: 20px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0,212,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .box h2 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .box h2 i {
            margin-right: 10px;
        }

        .box p {
            font-size: 15px;
            opacity: 0.85;
            margin-bottom: 30px;
            color: #ccc;
        }

        /* Simple input */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.2);
            transform: translateY(-1px);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0,212,255,0.7);
            font-size: 16px;
        }

        /* Simple button */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,212,255,0.4);
        }

        /* Back link */
        .back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            padding: 10px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .back:hover {
            color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .box {
                margin: 20px;
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <h2><i class="fas fa-lock-open"></i> Reset Password</h2>
        <p>Enter your new password</p>

        <form method="POST">
    {% csrf_token %}

    <div class="input-group">
        <input type="password" name="new_password1" placeholder="New Password" required minlength="6">
    </div>

    <div class="input-group">
        <input type="password" name="new_password2" placeholder="Confirm Password" required minlength="6">
    </div>

    <button type="submit">Reset Password</button>
</form>

        <a href="/login" class="back">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>
</body>
</html>
