<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<style>
body{
    margin:0;
    font-family: Poppins, sans-serif;
    background: radial-gradient(circle at top, #0b0f2a, #050713);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* card */
.container{
    width:350px;
    padding:30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius:15px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    color:white;
    text-align:center;
}

/* heading */
.container h2{
    margin-bottom:20px;
    color:#00d4ff;
    font-weight:600;
}

/* input */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
    background: rgba(255,255,255,0.1);
    color:white;
}

/* button */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background: linear-gradient(90deg,#00d4ff,#007bff);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform: scale(1.05);
    box-shadow: 0 0 15px #00d4ff;
}

/* label */
label{
    float:left;
    font-size:13px;
    margin-top:10px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="container">

    <h2>Reset Password</h2>

    <form method="post">
        {% csrf_token %}

        <label>Enter New Password</label>
        <input type="password" name="password" placeholder="Enter new password" required>

        <button type="submit">Reset Password</button>
    </form>

</div>

</body>
</html>
