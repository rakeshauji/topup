<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
           background: #0b0f2a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Simple blue glows */
        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: #00d4ff;
            filter: blur(100px);
            top: 15%;
            left: 10%;
            opacity: 0.15;
        }

        body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: #0099cc;
            filter: blur(80px);
            bottom: 15%;
            right: 10%;
            opacity: 0.12;
        }

        /* Simple card */
        .box {
            width: 100%;
            max-width: 380px;
            padding: 45px 35px;
            border-radius: 20px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0,212,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .box h2 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .box h2 i {
            margin-right: 10px;
        }

        .box p {
            font-size: 15px;
            opacity: 0.85;
            margin-bottom: 20px;
            color: #ccc;
        }

        /* OTP info - simple */
        .otp-info {
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            color: rgba(255,255,255,0.9);
        }

        /* Error - simple */
        .error {
            background: rgba(255,80,80,0.15);
            border: 1px solid rgba(255,80,80,0.4);
            color: #ff9999;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* OTP input */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 3px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.2);
            transform: translateY(-1px);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0,212,255,0.7);
            font-size: 16px;
        }

        /* Simple button */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,212,255,0.4);
        }

        /* Links */
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .link {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .link:hover {
            color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .box {
                margin: 20px;
                padding: 35px 25px;
            }
            .links {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <h2><i class="fas fa-key"></i> Verify OTP</h2>
        <p>Enter 6-digit code sent to your email</p>

        <div class="otp-info">
            <i class="fas fa-envelope" style="font-size: 20px; color: #00d4ff; margin-bottom: 5px; display: block;"></i>
            Check your inbox/spam folder
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="otp" placeholder="123456" maxlength="6" required>
                <i class="fas fa-key input-icon"></i>
            </div>
            <button type="submit">Verify OTP</button>
        </form>

        <div class="links">
            <a href="/forgot-password" class="link">
                <i class="fas fa-redo"></i> Resend OTP
            </a>
            <a href="/login" class="link">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>

    <script>
        // Simple OTP input handler
        const otpInput = document.querySelector('input[name="otp"]');
        otpInput.addEventListener('input', function() {
            // Only numbers
            this.value = this.value.replace(/[^0-9]/g, '').slice(0,6);
        });
    </script>
</body>
</html>
